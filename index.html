<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Boutique en ligne premium — Produits de beauté, bijoux et pyjamas de qualité supérieure.">
    <title>AXOU BOUTIQUE — Beauté, Bijoux & Pyjamas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/index.css?v=1.0.1">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://axou-boutique.vercel.app/">
    <!-- À mettre à jour avec l'URL réelle si différente -->
    <meta property="og:title" content="AXOU BOUTIQUE — Beauté, Bijoux & Pyjamas">
    <meta property="og:description"
        content="Découvrez notre sélection exclusive de produits de beauté, bijoux et pyjamas premium. L'élégance redéfinie.">
    <meta property="og:image"
        content="https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=1200&h=630&fit=crop">
</head>

<body>
    <div id="app"></div>

    <script type="module">
        import { firebaseConfig } from "./js/firebase-config.js?v=1.0.1";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Make Firebase functions available globally for our legacy scripts
        window.fbDB = db;
        window.fbAuth = auth;
        window.fbRef = ref;
        window.fbOnValue = onValue;
        window.fbSet = set;
        window.fbPush = push;
        window.fbUpdate = update;
        window.fbRemove = remove;
        window.fbSignIn = signInWithEmailAndPassword;
        window.fbOnAuthStateChanged = onAuthStateChanged;
        window.fbSignOut = signOut;
        window.fbUpdatePassword = updatePassword;

        console.log("Firebase initialized with Auth");
    </script>

    <script src="js/data.js?v=1.0.1"></script>
    <script src="js/store.js?v=1.0.1"></script>
    <script src="js/router.js?v=1.0.1"></script>
    <script src="js/components/Navbar.js?v=1.0.1"></script>
    <script src="js/components/Footer.js?v=1.0.1"></script>
    <script src="js/pages/Home.js?v=1.0.1"></script>
    <script src="js/pages/Catalog.js?v=1.0.1"></script>
    <script src="js/pages/ProductDetail.js?v=1.0.1"></script>
    <script src="js/pages/Cart.js?v=1.0.1"></script>
    <script src="js/pages/Checkout.js?v=1.0.1"></script>
    <script src="js/pages/Admin.js?v=1.0.1"></script>
    <script src="js/app.js?v=1.0.1"></script>
</body>

</html>
